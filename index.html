<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Negocios por Grupo Automotriz</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --text: #14213d;
      --muted: #64748b;
      --line: #e2e8f0;
      --primary: #12355b;
      --primary-2: #2563eb;
      --chip: #eef4ff;
      --chip-text: #1d4ed8;
      --shadow: 0 18px 45px rgba(15, 23, 42, .10);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: radial-gradient(circle at top left, #dceafe 0, transparent 32%), var(--bg);
    color: var(--text);
    }

    .page {
        flex: 1;
        max-width: 1240px;
        width: 100%;
        margin: 0 auto;
        padding: 34px 22px 40px;
    }

    .hero {
      background: linear-gradient(135deg, #0f2a44, #174a7c 58%, #2563eb);
      color: white;
      border-radius: 26px;
      padding: 34px;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .hero::after {
      content: "";
      position: absolute;
      width: 360px;
      height: 360px;
      border-radius: 50%;
      background: rgba(255,255,255,.10);
      right: -120px;
      top: -160px;
    }

    .hero h1 {
      margin: 0 0 10px;
      font-size: clamp(28px, 4vw, 46px);
      letter-spacing: -.04em;
      line-height: 1;
    }

    .hero p {
      max-width: 760px;
      margin: 0;
      color: rgba(255,255,255,.82);
      font-size: 16px;
    }

    .kpis {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
      margin-top: 18px;
    }

    .kpi {
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 18px;
      padding: 16px;
      backdrop-filter: blur(8px);
    }

    .kpi strong {
      display: block;
      font-size: 30px;
      line-height: 1;
      margin-bottom: 6px;
    }

    .kpi span { color: rgba(255,255,255,.75); font-size: 13px; }

    .toolbar {
      margin: 22px 0;
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .search {
      flex: 1;
      min-width: 260px;
      background: white;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 14px 18px;
      box-shadow: 0 10px 24px rgba(15, 23, 42, .06);
      font-size: 15px;
      outline: none;
    }

    .btn {
      border: none;
      border-radius: 999px;
      padding: 13px 16px;
      background: var(--primary);
      color: white;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(15, 23, 42, .10);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 18px;
    }

    .group-card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 14px 32px rgba(15, 23, 42, .07);
      overflow: hidden;
    }

    .group-head {
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      background: linear-gradient(180deg, #ffffff, #f8fbff);
    }

    .group-title {
      margin: 0;
      font-size: 19px;
      letter-spacing: -.02em;
    }

    .group-meta {
      margin-top: 7px;
      color: var(--muted);
      font-size: 13px;
    }

    .pill-count {
      white-space: nowrap;
      color: #0f5132;
      background: #dcfce7;
      border: 1px solid #bbf7d0;
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 12px;
      font-weight: 800;
    }

    .importer {
      padding: 16px 20px;
      border-bottom: 1px solid var(--line);
    }

    .importer:last-child { border-bottom: none; }

    .importer-name {
      font-weight: 800;
      color: var(--primary);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--primary-2);
      flex: 0 0 auto;
    }

    .details {
      display: grid;
      gap: 8px;
      margin-bottom: 12px;
    }

    .detail-row {
      display: grid;
      grid-template-columns: 104px 1fr;
      gap: 10px;
      font-size: 13px;
    }

    .label { color: var(--muted); font-weight: 700; }
    .value { color: #334155; }

    .chips {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
      margin-top: 4px;
    }

    .chip {
      background: var(--chip);
      color: var(--chip-text);
      border: 1px solid #dbeafe;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 700;
    }

    .empty {
      padding: 30px;
      text-align: center;
      color: var(--muted);
      background: white;
      border-radius: var(--radius);
      border: 1px dashed var(--line);
    }

    @media (max-width: 760px) {
      .hero { padding: 26px; }
      .kpis { grid-template-columns: 1fr; }
      .grid { grid-template-columns: 1fr; }
      .detail-row { grid-template-columns: 1fr; gap: 3px; }
    }
    .footer {
    width: 100%;
    padding: 18px;
    text-align: center;
    background: #12355b;
    color: white;
    border-top: 3px solid #2563eb;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
    }

    .footer-line {
        font-size: 13px;
        font-weight: 500;
        letter-spacing: 0.4px;
        line-height: 1.8;
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <h1>Negocios por Grupo Automotriz</h1>
      <p>Departamento de Producto-Grupo Purdy</p>
      <div class="kpis">
        <div class="kpi"><strong id="kpiGrupos">0</strong><span>Grupos</span></div>
        <div class="kpi"><strong id="kpiImportadores">0</strong><span>Importadores únicos</span></div>
        <div class="kpi"><strong id="kpiNegocios">0</strong><span>Negocios únicos agrupados</span></div>
      </div>
    </section>

    <section class="toolbar">
      <input id="searchInput" class="search" type="search" placeholder="Buscar por grupo, importador, razón social, cédula o negocio..." />
      <button class="btn" onclick="toggleAll()">Expandir / contraer</button>
    </section>

    <section id="content" class="grid"></section>
  </main>
  <footer class="footer">
    <div class="footer-line">
        Desarrollado por Pedro Abarca
    </div>

    <div class="footer-line">
        Información suministrada por Diego Ruíz
    </div>
  </footer>

    const state = { expanded: true };

    const unique = arr => [...new Set(arr.filter(Boolean))];
    const escapeHtml = value => String(value ?? '').replace(/[&<>'"]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#039;','"':'&quot;'}[ch]));

    function formatList(values) {
      if (!values || !values.length) return '<span class="value">—</span>';
      return values.map(v => `<span>${escapeHtml(v)}</span>`).join('<br>');
    }

    function render(data = DATA) {
      document.getElementById('kpiGrupos').textContent = data.length;
      document.getElementById('kpiImportadores').textContent = data.reduce((acc, g) => acc + g.total_importadores, 0);
      document.getElementById('kpiNegocios').textContent = data.reduce((acc, g) => acc + g.total_negocios, 0);

      const content = document.getElementById('content');
      if (!data.length) {
        content.className = '';
        content.innerHTML = '<div class="empty">No se encontraron resultados con ese filtro.</div>';
        return;
      }
      content.className = 'grid';
      content.innerHTML = data.map(group => `
        <article class="group-card">
          <header class="group-head">
            <div>
              <h2 class="group-title">${escapeHtml(group.grupo)}</h2>
              <div class="group-meta">${group.total_importadores} importadores · ${group.total_negocios} negocios</div>
            </div>
            <span class="pill-count">${group.total_negocios} negocios</span>
          </header>
          ${state.expanded ? group.importadores.map(item => `
            <section class="importer">
              <div class="importer-name"><span class="dot"></span>${escapeHtml(item.importador)}</div>
              <div class="details">
                <div class="detail-row"><div class="label">Razón social</div><div class="value">${formatList(item.razones)}</div></div>
                <div class="detail-row"><div class="label">Cédula</div><div class="value">${formatList(item.cedulas)}</div></div>
              </div>
              <div class="label">Negocios</div>
              <div class="chips">
                ${item.negocios.length ? item.negocios.map(n => `<span class="chip">${escapeHtml(n)}</span>`).join('') : '<span class="chip">Sin negocio especificado</span>'}
              </div>
            </section>
          `).join('') : ''}
        </article>
      `).join('');
    }

    function applyFilter() {
      const term = document.getElementById('searchInput').value.toLowerCase().trim();
      if (!term) return render(DATA);
      const filtered = DATA.map(group => {
        const importadores = group.importadores.filter(item => {
          const text = [group.grupo, item.importador, ...(item.razones || []), ...(item.cedulas || []), ...(item.negocios || [])].join(' ').toLowerCase();
          return text.includes(term);
        });
        return { ...group, importadores, total_importadores: importadores.length, total_negocios: importadores.reduce((a, i) => a + i.count, 0) };
      }).filter(g => g.importadores.length || g.grupo.toLowerCase().includes(term));
      render(filtered);
    }

    function toggleAll() {
      state.expanded = !state.expanded;
      applyFilter();
    }

    document.getElementById('searchInput').addEventListener('input', applyFilter);
    render();
  </script>
